services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_NAME=cite_es
      - DB_USER=root
      - DB_PASSWORD=root
      - JWT_SECRET=cite_evaluation_system_secret_key_2026
    depends_on:
      - db
      - redis
    networks:
      - cite_network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "81:80"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - cite_network

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    networks:
      - cite_network

  db:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=cite_es
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ../database/cite_es.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - cite_network

networks:
  cite_network:
    driver: bridge

volumes:
  db_data:
