sonar.projectKey=rubygraceones9-crypto_college-evaluation-system
sonar.organization=rubygraceones9-crypto

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=college-evaluation-system
sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=.

# Exclude unnecessary and compiled modules
sonar.exclusions=node_modules/**, .next/**, tmp/**, out/**, public/**, **/*.test.ts, **/*.test.tsx, tools/**, **/*.css, database/**, k8s/**

# Suppress annoying rules for TSX rendering patterns
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7
# Suppress Cognitive Complexity
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.tsx
# Suppress Button Role error
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S6819
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.tsx
# Suppress non-native interactive
sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S6479
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.tsx
# Suppress Cognitive Complexity for API routes
sonar.issue.ignore.multicriteria.e4.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*.ts
# Suppress unnecessary await
sonar.issue.ignore.multicriteria.e5.ruleKey=typescript:S4326
sonar.issue.ignore.multicriteria.e5.resourceKey=**/*.ts
# Suppress useless assignment
sonar.issue.ignore.multicriteria.e6.ruleKey=typescript:S1481
sonar.issue.ignore.multicriteria.e6.resourceKey=**/*.tsx
# Suppress nested ternary
sonar.issue.ignore.multicriteria.e7.ruleKey=typescript:S3358
sonar.issue.ignore.multicriteria.e7.resourceKey=**/*.tsx

sonar.sourceEncoding=UTF-8

# Force JS/TS handling
sonar.javascript.node.maxspace=4096
